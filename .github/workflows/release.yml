name: Release Assets

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  ZIG_VERSION: 0.16.0

jobs:
  prepare:
    name: Prepare Release Context
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            echo "Expected format: v0.1.0" >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Verify build.zig.zon version
        shell: bash
        run: |
          expected="${{ steps.resolve.outputs.version }}"
          actual="$(sed -n 's/.*\.version = "\([^"]*\)".*/\1/p' build.zig.zon | head -n 1)"

          if [ -z "$actual" ]; then
            echo "Unable to read version from build.zig.zon" >&2
            exit 1
          fi

          if [ "$actual" != "$expected" ]; then
            echo "Tag version ($expected) does not match build.zig.zon version ($actual)." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }} Asset
    needs: prepare
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            target: x86_64-linux
            asset_suffix: linux-x86_64
            exec_suffix: ""
            archive_suffix: tar.gz
          - name: macOS
            runner: macos-latest
            target: aarch64-macos
            asset_suffix: macos-aarch64
            exec_suffix: ""
            archive_suffix: tar.gz
          - name: Windows
            runner: windows-latest
            target: x86_64-windows
            asset_suffix: windows-x86_64
            exec_suffix: .exe
            archive_suffix: zip

    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Zig on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          host="$(uname -m)-linux"
          archive="zig-$host-$ZIG_VERSION.tar.xz"
          url="https://ziglang.org/download/$ZIG_VERSION/$archive"
          zig_root="$RUNNER_TEMP/zig-$host-$ZIG_VERSION"

          curl -L "$url" -o "$RUNNER_TEMP/$archive"
          tar -xf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP"
          echo "$zig_root" >> "$GITHUB_PATH"
          "$zig_root/zig" version

      - name: Install Zig on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          case "$(uname -m)" in
            arm64) host="aarch64-macos" ;;
            x86_64) host="x86_64-macos" ;;
            *) echo "Unsupported macOS host architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          archive="zig-$host-$ZIG_VERSION.tar.xz"
          url="https://ziglang.org/download/$ZIG_VERSION/$archive"
          zig_root="$RUNNER_TEMP/zig-$host-$ZIG_VERSION"

          curl -L "$url" -o "$RUNNER_TEMP/$archive"
          tar -xf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP"
          echo "$zig_root" >> "$GITHUB_PATH"
          "$zig_root/zig" version

      - name: Install Zig on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "zig-x86_64-windows-$env:ZIG_VERSION.zip"
          $url = "https://ziglang.org/download/$env:ZIG_VERSION/$archive"

          Invoke-WebRequest -Uri $url -OutFile (Join-Path $env:RUNNER_TEMP $archive)
          Expand-Archive -Path (Join-Path $env:RUNNER_TEMP $archive) -DestinationPath $env:RUNNER_TEMP -Force

          $zig_root = Join-Path $env:RUNNER_TEMP "zig-x86_64-windows-$env:ZIG_VERSION"
          if (-not (Test-Path $zig_root)) {
            throw "Zig install directory not found: $zig_root"
          }

          $zig_root | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $zig_bin = Join-Path $zig_root "zig.exe"
          & $zig_bin version

      - name: Build release binary on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          prefix="$RUNNER_TEMP/prefix-${{ matrix.target }}"
          zig build -Doptimize=ReleaseSafe -Dtarget="${{ matrix.target }}" --prefix "$prefix"

      - name: Build release binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP "prefix-${{ matrix.target }}"
          $target_arg = "-Dtarget=${{ matrix.target }}"
          & zig build -Doptimize=ReleaseSafe $target_arg --prefix $prefix

      - name: Package release assets on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          prefix="$RUNNER_TEMP/prefix-${{ matrix.target }}"
          mkdir -p dist

          base_name="mg-$RELEASE_TAG-${{ matrix.asset_suffix }}"
          raw_asset="dist/$base_name${{ matrix.exec_suffix }}"
          archive_asset="dist/$base_name.${{ matrix.archive_suffix }}"
          sha_asset="dist/$base_name.sha256.txt"

          cp "$prefix/bin/mg${{ matrix.exec_suffix }}" "$raw_asset"
          tar -C dist -czf "$archive_asset" "$(basename "$raw_asset")"

          hash="$(shasum -a 256 "$raw_asset" | awk '{print $1}')"
          printf '%s *%s\n' "$hash" "$(basename "$raw_asset")" > "$sha_asset"

      - name: Package release assets on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP "prefix-${{ matrix.target }}"
          $asset_dir = Join-Path $PWD "dist"
          $base_name = "mg-$env:RELEASE_TAG-${{ matrix.asset_suffix }}"
          $raw_asset = Join-Path $asset_dir "$base_name${{ matrix.exec_suffix }}"
          $archive_asset = Join-Path $asset_dir "$base_name.${{ matrix.archive_suffix }}"
          $sha_asset = Join-Path $asset_dir "$base_name.sha256.txt"

          New-Item -ItemType Directory -Path $asset_dir -Force | Out-Null
          Copy-Item -LiteralPath (Join-Path $prefix "bin\\mg.exe") -Destination $raw_asset -Force
          Compress-Archive -Path $raw_asset -DestinationPath $archive_asset -Force

          $hash = (Get-FileHash -LiteralPath $raw_asset -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$(Split-Path -Leaf $raw_asset)" | Out-File -FilePath $sha_asset -Encoding ascii

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
